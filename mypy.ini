[mypy]
python_version = 3.11
ignore_missing_imports = True
strict = False
namespace_packages = True

# Focus on critical bug-catching errors only
# Disable non-critical style/annotation issues
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
check_untyped_defs = False

# Enable strict argument checking - this is critical for catching real bugs
strict_optional = True
warn_return_any = False
warn_unused_ignores = False

# Disable non-critical error codes - focus only on real bugs
# Removed 'arg-type' from disabled codes to catch argument type mismatches
# Removed 'misc' to catch more potential issues
disable_error_code = annotation-unchecked,import-untyped,valid-type,name-defined,var-annotated,no-redef,func-returns-value,empty-body,override,call-overload,union-attr,type-var

# Keep all the important bug-catching checks enabled (these are on by default)
# - call-arg: Missing/incorrect function arguments ✅
# - arg-type: Incompatible argument types ✅
# - return-value: Incompatible return types ✅
# - attr-defined: Undefined attributes ✅
# - assignment: Incompatible assignments ✅
# - operator: Invalid operations ✅
# - index: Invalid indexing ✅
# - misc: Other important errors ✅

[mypy-common.*]
# Remove the strict typing requirement for common module
# This was causing most of the non-critical "no-untyped-def" errors
disallow_untyped_defs = False